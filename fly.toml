app = "tanmaygpt-api"
primary_region = "bom"   # Mumbai — lowest latency for Indian users

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  ENV = "prod"
  LOG_LEVEL = "INFO"
  API_HOST = "0.0.0.0"
  API_PORT = "8000"
  QDRANT_URL = "https://your-qdrant-instance.hetzner.com:6333"  # update before deploy

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 40

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    port = 8000
    timeout = "5s"
    type = "http"
